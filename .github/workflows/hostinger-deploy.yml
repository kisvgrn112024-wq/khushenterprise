name: Hostinger CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend to Hostinger
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout the Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # 3. Install Dependencies & Build Frontend
      - name: Build Next.js Static Export
        run: |
          cd frontend
          npm ci
          npm run build
          echo "✅ Build successful — out/ directory contents:"
          ls -la out/

      # 4. Verify Build Output Exists
      - name: Verify Build Output
        run: |
          if [ ! -f "./frontend/out/index.html" ]; then
            echo "❌ BUILD FAILED: out/index.html not found!"
            exit 1
          fi
          echo "✅ Build verified: index.html exists"
          echo "📦 Total files in out/:"
          find ./frontend/out -type f | wc -l
          
      # 5. Deploy to Hostinger via FTP
      # This pushes the built 'out' folder directly to Hostinger's public_html
      # Setting dangerous-clean-slate to false to protect user-uploaded files
      - name: Sync to Hostinger public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./frontend/out/
          server-dir: ./public_html/
          dangerous-clean-slate: false
          exclude: |
            **/uploads/**
          
  deploy-backend:
    name: Restart Backend Server (Optional)
    runs-on: ubuntu-latest
    needs: deploy-frontend
    
    steps:
      # 1. Deployment hook for Node.js Backend 
      # (If you are running the backend on a VPS or via SSH)
      - name: Trigger Backend Update
        run: echo "Backend deployment logic can be added here using SSH if hosted on a separate VPS or Node.js environment."
